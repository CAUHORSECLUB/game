<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speed Challenge: Ranking</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Pretendard', sans-serif; overflow: hidden; touch-action: none; text-align: center; }
        #ui { padding-top: 50px; pointer-events: none; }
        #timer { font-size: 3.5rem; font-weight: bold; color: #00ff88; }
        #target { font-size: 1.2rem; color: #aaa; }
        .penalty-flash { background: #550000 !important; }
        
        .circle { 
            position: absolute; width: 80px; height: 80px; background: #ff0055; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 1.8rem; font-weight: bold; box-shadow: 0 0 25px rgba(255,0,85,0.6);
            z-index: 10;
        }

        /* 결과 화면 및 랭킹 스타일 */
        #result-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 100;
            overflow-y: auto; padding: 20px 0;
        }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; margin-bottom: 30px; }
        button { padding: 12px 20px; font-size: 1rem; border: none; border-radius: 10px; font-weight: bold; }
        #btn-share { background: #fee500; color: #3c1e1e; }
        #btn-retry { background: #444; color: white; }

        .ranking-container { width: 80%; max-width: 300px; background: #2a2a2a; border-radius: 15px; padding: 15px; }
        .ranking-title { font-size: 1.2rem; color: #00ff88; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .ranking-item { display: flex; justify-content: space-between; padding: 8px 0; font-size: 1.1rem; border-bottom: 1px dashed #3d3d3d; }
        .ranking-item:last-child { border-bottom: none; }
        .rank-num { color: #ff0055; font-weight: bold; }
    </style>
</head>
<body id="bg">

<div id="ui">
    <div id="target">NEXT: <span id="next-num" style="color:white; font-size:2rem;">1</span></div>
    <div id="timer">0.00s</div>
    <div id="msg" style="color:#ff4444; height: 20px; font-weight:bold; margin-top:5px;"></div>
</div>

<div id="result-screen">
    <h1 id="rank-grade" style="font-size: 4rem; margin: 0; color: #00ff88;">S</h1>
    <p id="final-time" style="font-size: 2rem; margin: 5px 0;">0.00s</p>
    
    <div class="btn-group">
        <button id="btn-share">자랑하기</button>
        <button id="btn-retry" onclick="location.reload()">다시 도전</button>
    </div>

    <!-- 랭킹 리스트 -->
    <div class="ranking-container">
        <div class="ranking-title">🏆 LOCAL TOP 5</div>
        <div id="ranking-list">
            <!-- 자바스크립트에서 랭킹 삽입 -->
        </div>
    </div>
</div>

<script>
    let currentNum = 1;
    let startTime;
    let timerInterval;
    let penaltyTime = 0;
    const maxNum = 20;
    
    const circle = document.createElement('div');
    circle.className = 'circle';
    document.body.appendChild(circle);

    function moveCircle() {
        const x = Math.random() * (window.innerWidth - 100) + 10;
        const y = Math.random() * (window.innerHeight - 300) + 200;
        circle.style.left = x + 'px';
        circle.style.top = y + 'px';
        circle.innerText = currentNum;
    }

    // 터치 로직
    window.addEventListener('touchstart', (e) => {
        if (e.target !== circle && currentNum > 1 && currentNum <= maxNum) {
            penaltyTime += 1.0;
            document.getElementById('bg').classList.add('penalty-flash');
            document.getElementById('msg').innerText = "MISS! +1.0s";
            setTimeout(() => {
                document.getElementById('bg').classList.remove('penalty-flash');
                document.getElementById('msg').innerText = "";
            }, 100);
        }
    }, {passive: false});

    circle.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (currentNum === 1) {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000 + penaltyTime;
                document.getElementById('timer').innerText = elapsed.toFixed(2) + 's';
            }, 10);
        }

        if (currentNum <= maxNum) {
            currentNum++;
            if (currentNum > maxNum) {
                clearInterval(timerInterval);
                saveAndShowResult();
            } else {
                document.getElementById('next-num').innerText = currentNum;
                moveCircle();
            }
        }
    });

    // 랭킹 저장 및 표시 로직
    function saveAndShowResult() {
        const finalTime = document.getElementById('timer').innerText;
        const score = parseFloat(finalTime);
        
        // 1. 기존 랭킹 불러오기
        let scores = JSON.parse(localStorage.getItem('speedRanking') || "[]");
        
        // 2. 새 기록 추가 후 정렬 (오름차순)
        scores.push(score);
        scores.sort((a, b) => a - b);
        
        // 3. 상위 5개만 유지 및 저장
        scores = scores.slice(0, 5);
        localStorage.setItem('speedRanking', JSON.stringify(scores));

        // 4. 화면 표시
        const rankInfo = getRank(score);
        document.getElementById('result-screen').style.display = 'flex';
        document.getElementById('rank-grade').innerText = rankInfo.r;
        document.getElementById('final-time').innerText = `기록: ${finalTime}s`;
        
        const listHtml = scores.map((s, i) => `
            <div class="ranking-item">
                <span><span class="rank-num">${i+1}위</span></span>
                <span>${s.toFixed(2)}s</span>
            </div>
        `).join('');
        document.getElementById('ranking-list').innerHTML = listHtml;

        // 공유 버튼 설정
        document.getElementById('btn-share').onclick = () => {
            if (navigator.share) {
                navigator.share({
                    title: 'Speed Challenge',
                    text: `내 최고 기록은 ${finalTime}초야! 랭킹 1위 뺏어볼 수 있어?`,
                    url: window.location.href
                });
            }
        };
    }

    function getRank(time) {
        if (time < 7) return { r: 'SSS' };
        if (time < 10) return { r: 'S' };
        if (time < 15) return { r: 'A' };
        return { r: 'B' };
    }

    moveCircle();
</script>
</body>
</html>
