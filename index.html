<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speed Challenge: Global Ranking</title>
    <!-- Firebase SDK v8 (CDN 방식) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Pretendard', -apple-system, sans-serif; overflow: hidden; touch-action: none; text-align: center; }
        
        /* 인트로 화면 */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 200;
        }
        .intro-guide { font-size: 1.8rem; font-weight: bold; margin-bottom: 25px; line-height: 1.3; color: #eee; }
        #nickname-input {
            padding: 15px; font-size: 1.2rem; border-radius: 12px; border: 2px solid #ff0055;
            background: #2a2a2a; color: white; margin-bottom: 25px; width: 220px; text-align: center;
            outline: none;
        }
        #nickname-input:focus { box-shadow: 0 0 15px rgba(255, 0, 85, 0.5); }
        .start-btn { 
            padding: 18px 60px; font-size: 1.4rem; background: #ff0055; color: white; 
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,0,85,0.3); transition: 0.2s;
        }
        .start-btn:active { transform: scale(0.95); }

        /* 게임 UI */
        #ui { padding-top: 50px; opacity: 0; pointer-events: none; transition: 0.3s; }
        #timer { font-size: 3.5rem; font-weight: bold; color: #00ff88; font-variant-numeric: tabular-nums; }
        #target { font-size: 1.1rem; color: #aaa; margin-bottom: 5px; }
        .penalty-flash { background: #550000 !important; }
        
        .circle { 
            position: absolute; width: 80px; height: 80px; background: #ff0055; 
            border-radius: 50%; display: none; align-items: center; justify-content: center; 
            font-size: 1.8rem; font-weight: bold; box-shadow: 0 0 25px rgba(255,0,85,0.5);
            z-index: 10; user-select: none;
        }

        /* 결과 화면 */
        #result-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(10, 10, 10, 0.98); flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        #rank-grade { font-size: 4.5rem; margin: 0; color: #00ff88; text-shadow: 0 0 20px rgba(0, 255, 136, 0.3); }
        .ranking-container { width: 85%; max-width: 340px; background: #222; border-radius: 15px; padding: 20px; margin-top: 25px; box-sizing: border-box; }
        .ranking-title { font-size: 1.2rem; color: #00ff88; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 8px; font-weight: bold; }
        .ranking-item { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #2a2a2a; font-size: 1.05rem; }
        .ranking-item:last-child { border-bottom: none; }
        .rank-num { color: #ff0055; font-weight: bold; margin-right: 10px; width: 30px; display: inline-block; }
        .btn-group { display: flex; gap: 12px; margin-top: 25px; }
        .sub-btn { padding: 14px 24px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body id="bg">

<div id="intro-screen">
    <div class="intro-guide">챌린지에 참여할<br>닉네임을 입력하세요</div>
    <input type="text" id="nickname-input" placeholder="닉네임 (최대 8자)" maxlength="8">
    <button class="start-btn" onclick="startGame()">도전 시작!</button>
</div>

<div id="ui">
    <div id="target">NEXT: <span id="next-num" style="color:white; font-size:1.8rem;">1</span></div>
    <div id="timer">0.00s</div>
    <div id="msg" style="color:#ff4444; height: 20px; font-weight:bold; margin-top:5px;"></div>
</div>

<div id="result-screen">
    <div id="rank-grade">S</div>
    <p id="final-time" style="font-size: 1.8rem; margin: 10px 0; color: #fff;"></p>
    <div class="btn-group">
        <button class="sub-btn" style="background:#fee500; color:#3c1e1e;" onclick="shareRecord()">기록 자랑하기</button>
        <button class="sub-btn" style="background:#444; color:white;" onclick="location.reload()">다시 도전</button>
    </div>
    <div class="ranking-container">
        <div class="ranking-title">🏆 GLOBAL TOP 5</div>
        <div id="ranking-list">데이터를 불러오고 있습니다...</div>
    </div>
</div>

<script>
    // --- [Firebase 설정 적용 완료] ---
    const firebaseConfig = {
        apiKey: "AIzaSyBlAKqIUcF3th_dBK8jEAfmQcHfCArWhsQ",
        authDomain: "speedtest-2066b.firebaseapp.com",
        databaseURL: "https://speedtest-2066b-default-rtdb.firebaseio.com",
        projectId: "speedtest-2066b",
        storageBucket: "speedtest-2066b.firebasestorage.app",
        messagingSenderId: "603318792382",
        appId: "1:603318792382:web:e36a51a6ee7b4fcc7a6eef",
        measurementId: "G-Y4BRC2W8F4"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // --- [게임 변수] ---
    let currentNum = 1;
    let startTime, timerInterval;
    let penaltyTime = 0;
    let isGameActive = false;
    let userNickname = "";
    const maxNum = 20;
    
    const circle = document.createElement('div');
    circle.className = 'circle';
    document.body.appendChild(circle);

    // --- [기능 함수] ---
    function startGame() {
        const input = document.getElementById('nickname-input');
        userNickname = input.value.trim() || "익명";
        
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('ui').style.opacity = '1';
        circle.style.display = 'flex';
        isGameActive = true;
        moveCircle();
    }

    function moveCircle() {
        const x = Math.random() * (window.innerWidth - 100) + 10;
        const y = Math.random() * (window.innerHeight - 300) + 200;
        circle.style.left = x + 'px';
        circle.style.top = y + 'px';
        circle.innerText = currentNum;
    }

    window.addEventListener('touchstart', (e) => {
        if (isGameActive && e.target !== circle && currentNum > 1 && currentNum <= maxNum) {
            penaltyTime += 1.0;
            document.getElementById('bg').classList.add('penalty-flash');
            document.getElementById('msg').innerText = "MISS! +1.0s";
            setTimeout(() => {
                document.getElementById('bg').classList.remove('penalty-flash');
                document.getElementById('msg').innerText = "";
            }, 120);
        }
    }, {passive: false});

    circle.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!isGameActive) return;

        if (currentNum === 1) {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000 + penaltyTime;
                document.getElementById('timer').innerText = elapsed.toFixed(2) + 's';
            }, 10);
        }

        if (currentNum <= maxNum) {
            currentNum++;
            if (currentNum > maxNum) {
                isGameActive = false;
                clearInterval(timerInterval);
                finishGame();
            } else {
                document.getElementById('next-num').innerText = currentNum;
                moveCircle();
            }
        }
    });

    function finishGame() {
        const finalTime = document.getElementById('timer').innerText;
        const scoreNum = parseFloat(finalTime);
        
        document.getElementById('result-screen').style.display = 'flex';
        document.getElementById('final-time').innerText = `${userNickname}: ${finalTime}s`;
        
        // 등급 산정
        let grade = 'B';
        if (scoreNum < 7) grade = 'SSS';
        else if (scoreNum < 10) grade = 'S';
        else if (scoreNum < 14) grade = 'A';
        document.getElementById('rank-grade').innerText = grade;

        // DB 저장
        database.ref('rankings').push({
            name: userNickname,
            score: scoreNum,
            timestamp: Date.now()
        }).then(() => {
            loadGlobalRanking();
        });
    }

    function loadGlobalRanking() {
        database.ref('rankings').orderByChild('score').limitToFirst(5).once('value', (snapshot) => {
            let listHtml = "";
            let i = 1;
            snapshot.forEach((child) => {
                const data = child.val();
                listHtml += `
                    <div class="ranking-item">
                        <span><span class="rank-num">${i++}위</span> ${data.name}</span>
                        <span>${data.score.toFixed(2)}s</span>
                    </div>`;
            });
            document.getElementById('ranking-list').innerHTML = listHtml || "아직 기록이 없습니다.";
        });
    }

    function shareRecord() {
        const time = document.getElementById('timer').innerText;
        if (navigator.share) {
            navigator.share({
                title: 'Speed Challenge',
                text: `[${userNickname}] 기록은 ${time}초! 내 실력을 따라올 수 있겠어?`,
                url: window.location.href
            });
        }
    }

    window.onload = loadGlobalRanking;
</script>
</body>
</html>
